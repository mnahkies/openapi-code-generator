name: Setup Node and pnpm

description: Install pnpm and setup Node with pnpm cache

inputs:
  node-version:
    description: Node.js version to use (e.g., 20.x)
    required: true
  registry-url:
    description: NPM registry URL
    required: false
    default: https://registry.npmjs.org
  cache:
    description: Enable package manager cache
    required: false
    default: pnpm

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        registry-url: ${{ inputs.registry-url }}
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}
