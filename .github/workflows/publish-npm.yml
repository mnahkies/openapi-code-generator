name: Publish NPM
on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  publish_npm:
    name: publish_npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to publish using trusted publishing
    environment: prod
    concurrency:
      group: publish-npm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: 26.2.0
          package-manager-cache: false

      - name: Validate tag matches package.json versions
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          node scripts/validate-package-version.mjs "${TAG_VERSION}"

      - run: pnpm ci

      - run: pnpm run build

      - name: Publish packages
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |

          if [[ $TAG_VERSION == *"alpha"* ]]; then
            NPM_DIST_TAG=alpha
          else
            NPM_DIST_TAG=latest
          fi

          pnpm stage publish -r --tag $NPM_DIST_TAG
