packages:
  - packages/*
  - integration-tests/*
  - e2e

dedupeInjectedDeps: true

gitChecks: false

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - lmdb
  - msgpackr-extract
  - nx
  - sharp
  - unrs-resolver

linkWorkspacePackages: deep

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - '@koa/router@15.5.0'

nodeOptions: ${NODE_OPTIONS:- } --experimental-vm-modules

overrides:
  '@isaacs/brace-expansion': ^5.0.1
  '@types/node': ^22.19.17
  axios: ^1.15.2
  'lodash-es@~4.17': ^4.18.0
  qs: ^6.14.2
  tar: ^7.5.11
  zod@4.1.11: 4.1.13

preferWorkspacePackages: true

publicHoistPattern:
  - '@typespec/*'
  - '@azure-tools/*'
  - '@types/node'
  - '@biomejs/biome'
